<style>
  .gps-container {
    margin-top: 15px;
    margin-bottom: 20px;
  }

  .btn-gps {
    width: 100%;
    padding: 12px;
    background-color: #f8f9fa;
    color: #4f46e5;
    border: 2px dashed #4f46e5;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
  }

  .btn-gps:hover {
    background-color: #e0e7ff;
  }

  .btn-gps.detectado {
    background-color: #ecfdf5;
    color: #059669;
    border: 2px solid #10b981;
  }

  .gps-coords {
    margin-top: 8px;
    font-size: 13px;
    color: #059669;
    text-align: center;
    font-weight: bold;
  }
</style>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-icon">🛠️</span>
      <h1>Registro de Taller</h1>
      <p>Crea tu cuenta para comenzar</p>
    </div>

    <div class="form-group">
      <label>Nombre del Taller</label>
      <input type="text" [(ngModel)]="taller.nombre_taller" placeholder="Ej: Taller Mecánico Central">
    </div>

    <div class="form-group">
      <label>Dirección</label>
      <input type="text" [(ngModel)]="taller.direccion" placeholder="Av. Principal #123">
    </div>

    <div class="gps-container">
      <button type="button" class="btn-gps" [ngClass]="{'detectado': ubicacionDetectada}" (click)="detectarUbicacion()">
        <span style="font-size: 18px;">{{ ubicacionDetectada ? '✅' : '📍' }}</span>
        {{ ubicacionDetectada ? 'Ubicación GPS Capturada' : 'Detectar mi Ubicación GPS' }}
      </button>

      <div *ngIf="ubicacionDetectada" class="gps-coords">
        Coordenadas exactas: {{taller.latitud.toFixed(5)}}, {{taller.longitud.toFixed(5)}}
      </div>
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" [(ngModel)]="taller.telefono" placeholder="70000000">
    </div>

    <div class="form-group">
      <label>Correo Electrónico</label>
      <input type="email" [(ngModel)]="taller.email" placeholder="taller@ejemplo.com">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="taller.contrasena" placeholder="Mínimo 8 caracteres">
    </div>

    <button class="btn-primary" (click)="guardarTaller()">Crear cuenta</button>

    <p class="auth-footer">
      ¿Ya tienes cuenta?
      <a routerLink="/login" style="color: #6366f1; font-weight: bold; cursor: pointer;">Inicia sesión aquí</a>
    </p>

  </div>
</div>
