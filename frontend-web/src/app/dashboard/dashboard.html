<div class="dashboard-layout">

  <aside class="sidebar">
    <div class="brand">
      <i class="icon-wrench"></i>
      <div class="brand-text">
        <h2>TallerPro</h2>
        <p>Sistema de Gestión</p>
      </div>
    </div>

    <nav class="menu">
      <a routerLink="/dashboard/inicio" routerLinkActive="active" class="menu-item">
        🏠 Inicio
      </a>

      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="menu-item">
        🚨 Emergencias
        <span class="badge">4</span>
      </a>

      <a routerLink="/dashboard/historial" routerLinkActive="active" class="menu-item">
        📋 Historial
      </a>

      <a routerLink="/dashboard/cuenta" routerLinkActive="active" class="menu-item">
        👤 Mi Cuenta
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
