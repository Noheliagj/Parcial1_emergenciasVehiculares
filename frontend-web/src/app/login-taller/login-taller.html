<div class="auth-wrapper">
  <div class="auth-card">

    <div style="margin-bottom: 20px; text-align: left;">
      <a routerLink="/" style="text-decoration: none; color: #6366f1; font-weight: bold; cursor: pointer;">
        ⬅️ Volver al Inicio
      </a>
    </div>

    <div class="auth-logo">
      <span class="logo-icon">🔧</span>
      <h1>TallerPro</h1>
      <p>Panel de gestión para talleres</p>
    </div>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="credenciales.email" placeholder="taller@ejemplo.com">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="credenciales.contrasena" placeholder="••••••••">
    </div>

    <button class="btn-primary" (click)="ingresar()">Iniciar sesión</button>

    <p class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/registro">Regístrate aquí</a>
    </p>

  </div>
</div>
